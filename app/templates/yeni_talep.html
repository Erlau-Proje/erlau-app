{% extends 'base.html' %}
{% block content %}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-semibold text-gray-800">Yeni Satın Alma Talebi</h1>
  <a href="{{ url_for('main.dashboard') }}" class="text-sm text-gray-500 hover:underline">← Geri</a>
</div>

<form method="POST" id="talep-form">
  <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6 mb-4">
    <h2 class="font-medium text-gray-800 mb-4">Talep Bilgileri</h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Departman</label>
        <select name="department_id" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
          {% for dep in departmanlar %}
          <option value="{{ dep.id }}" {% if dep.id == current_user.department_id %}selected{% endif %}>{{ dep.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Kullanım amacı</label>
        <select name="kullanim_amaci" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
          <option>Üretim</option>
          <option>Bakım</option>
          <option>Sarf Malzeme</option>
          <option>Personel İhtiyacı</option>
          <option>Diğer</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Kullanılan alan</label>
        <select name="kullanilan_alan" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
          <option value="FA">FA — Makine bölümü</option>
          <option value="OEA">OEA — Dış mekan</option>
          <option value="OEI">OEI — İç mekan</option>
          <option value="OEF">OEF</option>
          <option value="OES">OES</option>
          <option value="Fason">Fason</option>
        </select>
      </div>
      <div class="md:col-span-3">
        <label class="block text-sm font-medium text-gray-700 mb-1">Proje / Makine adı</label>
        <input type="text" name="proje_makine" placeholder="Proje veya makine adı"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
      </div>
    </div>
  </div>

  <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6 mb-4">
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-medium text-gray-800">Malzeme Listesi</h2>
      <button type="button" onclick="satirEkle()"
        class="text-sm border border-green-600 text-green-700 px-3 py-1 rounded-lg hover:bg-green-50">
        + Satır Ekle
      </button>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm" id="malzeme-table">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-3 py-2 text-left text-xs font-medium text-gray-500">#</th>
            <th class="px-3 py-2 text-left text-xs font-medium text-gray-500">Malzeme adı *</th>
            <th class="px-3 py-2 text-left text-xs font-medium text-gray-500">Marka / model / ölçü</th>
            <th class="px-3 py-2 text-left text-xs font-medium text-gray-500">Tür</th>
            <th class="px-3 py-2 text-left text-xs font-medium text-gray-500">Birim</th>
            <th class="px-3 py-2 text-left text-xs font-medium text-gray-500">Miktar</th>
            <th class="px-3 py-2 text-left text-xs font-medium text-gray-500">Hedef</th>
            <th class="px-3 py-2 text-left text-xs font-medium text-gray-500">KW</th>
            <th class="px-3 py-2 text-left text-xs font-medium text-gray-500">Açıklama</th>
            <th class="px-3 py-2"></th>
          </tr>
        </thead>
        <tbody id="malzeme-tbody">
          <tr class="border-t border-gray-100">
            <td class="px-3 py-2 text-gray-400 text-xs">1</td>
            <td class="px-3 py-2"><input type="text" name="malzeme_adi[]" class="w-full border border-gray-200 rounded px-2 py-1 text-xs" placeholder="Malzeme adı"></td>
            <td class="px-3 py-2"><input type="text" name="marka_model[]" class="w-full border border-gray-200 rounded px-2 py-1 text-xs" placeholder="Marka/model"></td>
            <td class="px-3 py-2"><select name="malzeme_turu[]" class="border border-gray-200 rounded px-2 py-1 text-xs"><option>Hammadde</option><option>Sarf malzeme</option><option>Yedek parça</option><option>Ambalaj</option><option>Demirbaş</option><option>Fason</option><option>Diğer</option></select></td>
            <td class="px-3 py-2"><select name="birim[]" class="border border-gray-200 rounded px-2 py-1 text-xs"><option>Adet</option><option>KG</option><option>Boy</option><option>M2</option><option>Metre</option><option>Paket</option></select></td>
            <td class="px-3 py-2"><input type="number" name="miktar[]" class="w-16 border border-gray-200 rounded px-2 py-1 text-xs" placeholder="0"></td>
            <td class="px-3 py-2"><select name="hedef[]" class="border border-gray-200 rounded px-2 py-1 text-xs"><option value="siparis">Sipariş</option><option value="stok">Stok</option><option value="proje">Proje</option></select></td>
            <td class="px-3 py-2"><input type="text" name="kw[]" class="w-16 border border-gray-200 rounded px-2 py-1 text-xs" placeholder="KW18"></td>
            <td class="px-3 py-2"><input type="text" name="aciklama[]" class="w-full border border-gray-200 rounded px-2 py-1 text-xs" placeholder="Not..."></td>
            <td class="px-3 py-2"><button type="button" onclick="this.closest('tr').remove()" class="text-red-400 hover:text-red-600 text-xs">✕</button></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="flex justify-end gap-3">
    <a href="{{ url_for('main.dashboard') }}" class="px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50">İptal</a>
    <button type="submit" class="erlau-green text-white px-6 py-2 rounded-lg text-sm font-medium hover:opacity-90">Talebi Gönder</button>
  </div>
</form>

<script>
let satirSayisi = 1;
function satirEkle() {
  satirSayisi++;
  const tbody = document.getElementById('malzeme-tbody');
  const tr = document.createElement('tr');
  tr.className = 'border-t border-gray-100';
  tr.innerHTML = `
    <td class="px-3 py-2 text-gray-400 text-xs">${satirSayisi}</td>
    <td class="px-3 py-2"><input type="text" name="malzeme_adi[]" class="w-full border border-gray-200 rounded px-2 py-1 text-xs" placeholder="Malzeme adı"></td>
    <td class="px-3 py-2"><input type="text" name="marka_model[]" class="w-full border border-gray-200 rounded px-2 py-1 text-xs" placeholder="Marka/model"></td>
    <td class="px-3 py-2"><select name="malzeme_turu[]" class="border border-gray-200 rounded px-2 py-1 text-xs"><option>Hammadde</option><option>Sarf malzeme</option><option>Yedek parça</option><option>Ambalaj</option><option>Demirbaş</option><option>Fason</option><option>Diğer</option></select></td>
    <td class="px-3 py-2"><select name="birim[]" class="border border-gray-200 rounded px-2 py-1 text-xs"><option>Adet</option><option>KG</option><option>Boy</option><option>M2</option><option>Metre</option><option>Paket</option></select></td>
    <td class="px-3 py-2"><input type="number" name="miktar[]" class="w-16 border border-gray-200 rounded px-2 py-1 text-xs" placeholder="0"></td>
    <td class="px-3 py-2"><select name="hedef[]" class="border border-gray-200 rounded px-2 py-1 text-xs"><option value="siparis">Sipariş</option><option value="stok">Stok</option><option value="proje">Proje</option></select></td>
    <td class="px-3 py-2"><input type="text" name="kw[]" class="w-16 border border-gray-200 rounded px-2 py-1 text-xs" placeholder="KW18"></td>
    <td class="px-3 py-2"><input type="text" name="aciklama[]" class="w-full border border-gray-200 rounded px-2 py-1 text-xs" placeholder="Not..."></td>
    <td class="px-3 py-2"><button type="button" onclick="this.closest('tr').remove()" class="text-red-400 hover:text-red-600 text-xs">✕</button></td>`;
  tbody.appendChild(tr);
}
</script>
{% endblock %}
