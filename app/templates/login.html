{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen flex items-center justify-center -mt-6">
  <div class="bg-white rounded-xl shadow-lg p-8 w-full max-w-md border border-gray-100">
    <div class="text-center mb-8">
      <div class="w-16 h-16 erlau-green rounded-xl flex items-center justify-center mx-auto mb-4">
        <span class="text-white font-bold text-2xl">E</span>
      </div>
      <h1 class="text-2xl font-semibold text-gray-800">Erlau Satın Alma</h1>
      <p class="text-gray-500 text-sm mt-1">Sisteme giriş yapın</p>
    </div>
    <form method="POST">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">E-posta</label>
        <input type="email" name="email" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-500"
          placeholder="ornek@erlau.com">
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Şifre</label>
        <input type="password" name="password" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-500"
          placeholder="••••••••">
      </div>
      <button type="submit"
        class="w-full erlau-green text-white py-2 rounded-lg text-sm font-medium hover:opacity-90 transition">
        Giriş Yap
      </button>
    </form>
  </div>
</div>
{% endblock %}
