name: CodeQL Guvenlik Analizi

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Her Pazartesi 09:00 Istanbul saati (06:00 UTC)
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: CodeQL Analiz
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: CodeQL Baslatiliyor
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality

      - name: Otomatik Build
        uses: github/codeql-action/autobuild@v3

      - name: CodeQL Analiz
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
