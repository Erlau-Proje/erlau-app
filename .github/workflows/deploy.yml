name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Guvenlik Taramasi (bandit)
        run: |
          pip install bandit -q
          bandit -r app/ -ll --format screen
          echo "Tarama tamamlandi — HIGH severity sorun yoksa deploy devam eder"

  deploy:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 178.104.49.105
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/erlau-app
            git pull origin main
            systemctl restart erlau
            sleep 3
            systemctl is-active erlau && echo "Servis aktif" || echo "HATA: Servis baslamadi"
